spring:
  application:
    name: TaskManagementPIC
  datasource:
    url: jdbc:postgresql://localhost:5432/TaskManagement_DB
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
      hibernate:
        ddl-auto: update
        show-sql: true
        properties:
        hibernate:
            format_sql: true
            dialect: org.hibernate.dialect.PostgresSQLDialect

